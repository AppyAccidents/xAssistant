<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X-Assistant</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="app" id="popupRoot">
    <header class="panel header">
      <div>
        <h1>X-Assistant</h1>
        <p class="subtitle">Bookmark/Likes Extractor</p>
      </div>
      <p id="statusText">Ready</p>
    </header>

    <section class="panel">
      <h2>Extraction</h2>

      <label class="field" for="usernameInput">
        <span>Username for likes (@handle)</span>
        <input id="usernameInput" type="text" placeholder="@username" autocomplete="off" />
      </label>

      <div class="button-grid">
        <button id="extractBookmarksBtn" class="action action-primary" type="button">Extract Bookmarks</button>
        <button id="extractLikesBtn" class="action action-secondary" type="button">Extract Likes</button>
        <button id="extractBothBtn" class="action" type="button">Extract Both</button>
      </div>

      <div class="progress-row">
        <progress id="progressBar" value="0" max="100"></progress>
        <span id="progressLabel">0%</span>
      </div>
    </section>

    <section class="panel">
      <h2>Export Report</h2>
      <div class="row">
        <label class="field" for="exportFormat">
          <span>Format</span>
          <select id="exportFormat">
            <option value="md">MD</option>
            <option value="csv">CSV</option>
            <option value="txt">TXT</option>
            <option value="json">JSON</option>
          </select>
        </label>
      </div>
      <button id="exportBtn" class="action action-primary" type="button">Export Report</button>
    </section>

    <section id="guideOverlay" class="guide-overlay" hidden>
      <div class="guide-card" role="dialog" aria-modal="true" aria-labelledby="guideTitle">
        <p class="guide-kicker">Quick Start</p>
        <h2 id="guideTitle">Step 1</h2>
        <p id="guideBody"></p>
        <p id="guideStepLabel" class="guide-step-label"></p>
        <div class="guide-actions">
          <button id="guideBackBtn" class="action" type="button">Back</button>
          <button id="guideSkipBtn" class="action" type="button">Skip</button>
          <button id="guideNextBtn" class="action action-primary" type="button">Next</button>
          <button id="guideDoneBtn" class="action action-primary" type="button">Got it</button>
        </div>
      </div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
